# ~/.config/home-manager/starship.toml

# 1. Global Settings
add_newline = false
command_timeout = 1000

# 2. The Format String (The Visual Layout)
format = """
[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$php\
$python\
$lua\
$zig\
$nix_shell\
[](fg:#86BBD8 bg:#06969A)\
$docker_context\
[](fg:#06969A bg:#33658A)\
$time\
[ ](fg:#33658A)\
"""

# 3. Module Configurations

[username]
show_always = true
style_user = "bg:#9A348E fg:#ffffff"
style_root = "bg:#9A348E fg:#ffffff"
format = '[$user ]($style)'

[os]
disabled = false
style = "bg:#9A348E fg:#ffffff"
format = '[$symbol]($style)'

[os.symbols]
Macos = " "
Ubuntu = " "
Arch = " "

[directory]
style = "bg:#DA627D fg:#ffffff"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#FCA17D fg:#000000"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D fg:#000000"
format = '[$all_status$ahead_behind ]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#33658A fg:#ffffff"
format = '[  $time ]($style)'

[docker_context]
symbol = " "
style = "bg:#06969A fg:#ffffff"
format = '[ $symbol $context ]($style)'

# --- Languages (Blue Block: #86BBD8) ---

[nix_shell]
symbol = " "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol nix ]($style)'

[python]
symbol = " "
style = "bg:#86BBD8 fg:#000000"
format = '[ ${symbol}${pyenv_prefix}(${version})(\($virtualenv\)) ]($style)'

[nodejs]
symbol = " "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = "∩ "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[lua]
symbol = "⨀ "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'

[php]
symbol = " "
style = "bg:#86BBD8 fg:#000000"
format = '[ $symbol ($version) ]($style)'
