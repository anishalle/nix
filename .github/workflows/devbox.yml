name: devbox image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/devbox:latest \
            -t ghcr.io/${{ github.repository_owner }}/devbox:${{ github.sha }} \
            .

      - name: Push
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/devbox:latest
          docker push ghcr.io/${{ github.repository_owner }}/devbox:${{ github.sha }}
